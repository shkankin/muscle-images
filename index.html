<!DOCTYPE html>
<html lang="en" data-theme="arena">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <title>M.U.S.C.L.E. Collector</title>
  <meta name="description" content="A collection tracker for the 236 M.U.S.C.L.E. figures — the US release of Kinnikuman's Kinkeshi. Track what you own, color variants, and what's left to find.">
  <link rel="canonical" href="https://musclemen.app/">

  <!-- Social / link previews -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="M.U.S.C.L.E. Collector">
  <meta property="og:title" content="M.U.S.C.L.E. Collector">
  <meta property="og:description" content="Track your collection of all 236 M.U.S.C.L.E. figures — owned, color variants, and what's left to find.">
  <meta property="og:url" content="https://musclemen.app/">
  <meta property="og:image" content="https://musclemen.app/images/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="M.U.S.C.L.E. Collector">
  <meta name="twitter:description" content="Track your collection of all 236 M.U.S.C.L.E. figures — owned, color variants, and what's left to find.">
  <meta name="twitter:image" content="https://musclemen.app/images/og-image.png">

  <!-- Content Security Policy: no inline scripts (script-src 'self'); inline
       style attributes are used by the renderer so style-src allows them.
       Figure images load from the companion raw.githubusercontent repo. -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    font-src 'self';
    img-src 'self' data: blob: https://raw.githubusercontent.com;
    connect-src 'self' https://raw.githubusercontent.com;
    manifest-src 'self';
    base-uri 'none';
    object-src 'none';
    form-action 'none';
  ">

  <meta name="theme-color" content="#14100D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="M.U.S.C.L.E.">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/icon-192.png">
  <link rel="apple-touch-icon" href="images/icon-192.png">

  <!-- Fonts are self-hosted (offline-capable, no external dependency).
       Anton = wrestling-poster display; Barlow Semi Condensed = UI text.
       The kanji accents fall back to the platform's Japanese font. -->
  <link rel="preload" href="fonts/anton-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <!-- First-paint splash (replaced by render() once the catalog loads). -->
    <div class="boot">
      <div class="boot-mark">M.U.S.C.L.E.</div>
      <div class="boot-sub">筋肉 · loading the set</div>
      <div class="boot-bar"><span></span></div>
    </div>
  </div>

  <noscript>
    <div style="padding:40px 22px;color:#F7EEE6;font-family:sans-serif;text-align:center">
      <h1>M.U.S.C.L.E. Collector</h1>
      <p>This app needs JavaScript enabled to track your collection.</p>
    </div>
  </noscript>

  <script type="module" src="js/app.js"></script>
</body>
</html>
